<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starfield — Claude Status</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #020408; overflow: hidden; }
  canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let W, H, cx, cy;
function resize() {
  W = canvas.width  = canvas.offsetWidth;
  H = canvas.height = canvas.offsetHeight;
  cx = W / 2; cy = H / 2;
  initStars();
}
window.addEventListener('resize', resize);

// ── State configs ─────────────────────────────────
const CFGS = {
  busy: {
    // Warp speed — stars fly toward viewer
    warpSpeed: 5.5, warpTrail: 0.18,
    shootRate: 0.0,   // no meteors during warp
    nebulaAlpha: 0.0,
    r: 255, g: 80,  b: 60,   // red tint
    twinkleSpeed: 3.5,
  },
  waiting: {
    warpSpeed: 0.0, warpTrail: 0.0,
    shootRate: 0.04,           // occasional meteor
    nebulaAlpha: 0.12,
    r: 255, g: 200, b: 80,   // amber tint
    twinkleSpeed: 1.2,
  },
  idle: {
    warpSpeed: 0.0, warpTrail: 0.0,
    shootRate: 0.008,          // rare meteor
    nebulaAlpha: 0.22,
    r: 80,  g: 180, b: 255,  // cool blue
    twinkleSpeed: 0.4,
  },
};

let cfg = { ...CFGS.idle };
let tgt = { ...CFGS.idle };
function lerp(a, b, k) { return a + (b - a) * k; }

// ── Star pool ─────────────────────────────────────
const STAR_COUNT = 280;
const stars = [];

function initStars() {
  stars.length = 0;
  for (let i = 0; i < STAR_COUNT; i++) {
    stars.push(makeStar(true));
  }
}

function makeStar(randomZ) {
  return {
    x:    (Math.random() - 0.5) * W,  // relative to center
    y:    (Math.random() - 0.5) * H,
    z:    randomZ ? Math.random() * W : W,   // z: far → small, near → large
    pz:   0,   // previous z (for trail)
    size: 0.5 + Math.random() * 1.5,
    twinkle: Math.random() * Math.PI * 2,
    twinkleAmp: 0.2 + Math.random() * 0.5,
  };
}

// ── Meteors ───────────────────────────────────────
const meteors = [];

function spawnMeteor() {
  const angle = (-0.3 - Math.random() * 0.4);  // falling diagonal
  const speed = 400 + Math.random() * 350;
  meteors.push({
    x: Math.random() * W,
    y: -20,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle + Math.PI / 2) * speed,
    len: 80 + Math.random() * 120,
    alpha: 1,
    life: 1,
  });
}

// ── Render ────────────────────────────────────────
let t = 0, lastTs = 0;

function animate(ts) {
  requestAnimationFrame(animate);
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;
  t += dt;

  const k = 1 - Math.pow(0.04, dt);
  cfg.warpSpeed    = lerp(cfg.warpSpeed,    tgt.warpSpeed,    k);
  cfg.warpTrail    = lerp(cfg.warpTrail,    tgt.warpTrail,    k);
  cfg.shootRate    = lerp(cfg.shootRate,    tgt.shootRate,    k);
  cfg.nebulaAlpha  = lerp(cfg.nebulaAlpha,  tgt.nebulaAlpha,  k);
  cfg.r = lerp(cfg.r, tgt.r, k);
  cfg.g = lerp(cfg.g, tgt.g, k);
  cfg.b = lerp(cfg.b, tgt.b, k);
  cfg.twinkleSpeed = lerp(cfg.twinkleSpeed, tgt.twinkleSpeed, k);

  const cr = Math.round(cfg.r), cg = Math.round(cfg.g), cb = Math.round(cfg.b);
  const isWarping = cfg.warpSpeed > 0.3;

  // ── Background ──
  if (isWarping) {
    // Warp: trail fade
    ctx.fillStyle = `rgba(2,4,8,${cfg.warpTrail})`;
  } else {
    ctx.fillStyle = 'rgba(2,4,8,0.25)';
  }
  ctx.fillRect(0, 0, W, H);

  // ── Nebula cloud (idle / waiting) ─────────────
  if (cfg.nebulaAlpha > 0.005) {
    const pulse = 0.7 + 0.3 * Math.sin(t * 0.4);
    for (let n = 0; n < 3; n++) {
      const nx = cx + Math.cos(t * 0.07 + n * 2.1) * W * 0.18;
      const ny = cy + Math.sin(t * 0.09 + n * 1.7) * H * 0.18;
      const nr = Math.min(W, H) * (0.28 + n * 0.08);
      const neb = ctx.createRadialGradient(nx, ny, 0, nx, ny, nr);
      neb.addColorStop(0,   `rgba(${cr},${cg},${cb},${(cfg.nebulaAlpha * pulse * 0.5).toFixed(3)})`);
      neb.addColorStop(0.5, `rgba(${cr},${cg},${cb},${(cfg.nebulaAlpha * pulse * 0.15).toFixed(3)})`);
      neb.addColorStop(1,   `rgba(${cr},${cg},${cb},0)`);
      ctx.fillStyle = neb;
      ctx.fillRect(0, 0, W, H);
    }
  }

  // ── Stars ────────────────────────────────────
  for (const s of stars) {
    s.pz = s.z;

    if (isWarping) {
      s.z -= cfg.warpSpeed * dt * 200;
      if (s.z <= 0) {
        s.x = (Math.random() - 0.5) * W;
        s.y = (Math.random() - 0.5) * H;
        s.z = s.pz = W;
      }

      // Project to screen
      const sx  = (s.x / s.z)  * W + cx;
      const sy  = (s.y / s.z)  * H + cy;
      const spx = (s.x / s.pz) * W + cx;
      const spy = (s.y / s.pz) * H + cy;
      const r   = Math.max(0.5, (1 - s.z / W) * 3.5);
      const alpha = Math.min(1, (1 - s.z / W) * 1.8);

      // Streak line
      ctx.strokeStyle = `rgba(${cr},${cg},${cb},${(alpha * 0.9).toFixed(2)})`;
      ctx.lineWidth   = r * 0.8;
      ctx.shadowColor = `rgb(${cr},${cg},${cb})`;
      ctx.shadowBlur  = r * 3;
      ctx.beginPath();
      ctx.moveTo(spx, spy);
      ctx.lineTo(sx, sy);
      ctx.stroke();
      ctx.shadowBlur = 0;

    } else {
      // Static star with twinkle
      s.twinkle += cfg.twinkleSpeed * dt;
      const a = s.twinkleAmp * (0.5 + 0.5 * Math.sin(s.twinkle));
      const r = s.size * (0.6 + 0.4 * Math.sin(s.twinkle * 1.3));
      const sx = s.x + cx;
      const sy = s.y + cy;

      ctx.shadowColor = `rgb(${cr},${cg},${cb})`;
      ctx.shadowBlur  = r * 2.5;
      ctx.fillStyle   = `rgba(${cr},${cg},${cb},${(0.5 + a * 0.5).toFixed(2)})`;
      ctx.beginPath();
      ctx.arc(sx, sy, r, 0, Math.PI * 2);
      ctx.fill();
      // Bright core
      ctx.fillStyle = `rgba(255,255,255,${(0.3 + a * 0.5).toFixed(2)})`;
      ctx.beginPath();
      ctx.arc(sx, sy, r * 0.35, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }

  // ── Meteors ───────────────────────────────────
  if (!isWarping && Math.random() < cfg.shootRate) spawnMeteor();

  for (let i = meteors.length - 1; i >= 0; i--) {
    const m = meteors[i];
    m.x    += m.vx * dt;
    m.y    += m.vy * dt;
    m.life -= dt * 1.2;
    m.alpha = Math.max(0, m.life);

    if (m.life <= 0 || m.x > W + 100 || m.y > H + 100) {
      meteors.splice(i, 1); continue;
    }

    const tailX = m.x - (m.vx / Math.hypot(m.vx, m.vy)) * m.len;
    const tailY = m.y - (m.vy / Math.hypot(m.vx, m.vy)) * m.len;
    const grad  = ctx.createLinearGradient(m.x, m.y, tailX, tailY);
    grad.addColorStop(0,   `rgba(255,255,255,${(m.alpha * 0.95).toFixed(2)})`);
    grad.addColorStop(0.2, `rgba(${cr},${cg},${cb},${(m.alpha * 0.6).toFixed(2)})`);
    grad.addColorStop(1,   `rgba(${cr},${cg},${cb},0)`);

    ctx.shadowColor = `rgb(${cr},${cg},${cb})`;
    ctx.shadowBlur  = 8;
    ctx.strokeStyle = grad;
    ctx.lineWidth   = 1.5;
    ctx.beginPath();
    ctx.moveTo(m.x, m.y);
    ctx.lineTo(tailX, tailY);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // ── Vignette ──────────────────────────────────
  const vig = ctx.createRadialGradient(cx, cy, Math.min(W, H) * 0.3, cx, cy, Math.min(W, H) * 0.85);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.6)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);
}

// ── State machine ─────────────────────────────────
let lastState = null;
function applyState(s) { tgt = { ...CFGS[s] }; }
function setState(s) {
  if (s === lastState) return;
  lastState = s;
  applyState(s);
}

window.addEventListener('message', ({ data: d }) => { if (d?.state) setState(d.state); });
async function poll() {
  try { const d = await (await fetch('/api/status')).json(); if (d?.state) setState(d.state); } catch {}
}
if (window.self === window.top) { setInterval(poll, 1000); poll(); }

resize();
requestAnimationFrame(animate);
setState('idle');
</script>
</body>
</html>
