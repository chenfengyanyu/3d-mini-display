<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DNA螺旋 — Claude Status</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ── Presets ───────────────────────────────────────────
const PRESETS = {
  busy:    { rotSpeed: 3.2,  cr1: 255, cg1:  48, cb1:   0,
                              cr2: 255, cg2: 120, cb2:  20,
             glowR: 150, glowG:  20, glowB:   0,
             particles: 3.5, scanLine: false },
  waiting: { rotSpeed: 1.1,  cr1: 255, cg1: 190, cb1:  10,
                              cr2: 255, cg2: 230, cb2:  80,
             glowR:  90, glowG:  70, glowB:   0,
             particles: 0.5, scanLine: true  },
  idle:    { rotSpeed: 0.35, cr1:  20, cg1: 220, cb1: 180,
                              cr2:  80, cg2: 255, cb2: 200,
             glowR:   0, glowG:  60, glowB:  70,
             particles: 0,   scanLine: false },
};

let curState  = 'idle';
let p = { ...PRESETS.idle };

function lerp(a, b, t) { return a + (b - a) * t; }

function applyLerp(dt) {
  const tgt = PRESETS[curState];
  const k = Math.min(dt * 2, 1);
  for (const key of Object.keys(tgt)) {
    if (typeof tgt[key] === 'number') p[key] = lerp(p[key], tgt[key], k);
    else p[key] = tgt[key];
  }
}

// ── Helix config ──────────────────────────────────────
const N_PAIRS = 20;      // base pairs visible
const TURNS   = 2.5;     // full turns of helix
let rotAngle  = 0;
let scanY     = 0;       // scanning highlight y position (0–1)

// ── Particle system (busy: sparks fly off base pairs) ─
const MAX_SPARKS = 120;
const sx   = new Float32Array(MAX_SPARKS);
const sy   = new Float32Array(MAX_SPARKS);
const svx  = new Float32Array(MAX_SPARKS);
const svy  = new Float32Array(MAX_SPARKS);
const slife= new Float32Array(MAX_SPARKS);
const sml  = new Float32Array(MAX_SPARKS);
let   sparkHead = 0;

function spawnSpark(ox, oy) {
  const i = sparkHead % MAX_SPARKS;
  sparkHead++;
  sx[i]   = ox;
  sy[i]   = oy;
  const angle = Math.random() * Math.PI * 2;
  const spd   = 30 + Math.random() * 80;
  svx[i]  = Math.cos(angle) * spd;
  svy[i]  = Math.sin(angle) * spd;
  slife[i]= 0;
  sml[i]  = 0.4 + Math.random() * 0.5;
}

// ── Pulse for idle breathing ──────────────────────────
let pulse = 0;
let pulseDir = 1;

// ── Draw loop ─────────────────────────────────────────
let lastTs = 0;
let sparkAccum = 0;

function frame(ts) {
  requestAnimationFrame(frame);
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  applyLerp(dt);
  rotAngle += p.rotSpeed * dt;

  // Pulse (idle breathing)
  pulse += dt * pulseDir * 1.2;
  if (pulse > 1)  { pulse = 1;  pulseDir = -1; }
  if (pulse < 0)  { pulse = 0;  pulseDir =  1; }

  // Scan line position (waiting)
  scanY = (scanY + dt * 0.4) % 1;

  // Clear
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(0, 0, W, H);

  // Centre glow
  const cx   = W * 0.5;
  const bg   = ctx.createRadialGradient(cx, H * 0.5, 0, cx, H * 0.5, Math.min(W, H) * 0.6);
  const ga   = curState === 'idle' ? 0.08 + pulse * 0.06 : 0.15;
  bg.addColorStop(0, `rgba(${~~p.glowR},${~~p.glowG},${~~p.glowB},${ga})`);
  bg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // ── Build base-pair list ─────────────────────────────
  const radius = Math.min(W, H) * 0.26;
  const topY   = H * 0.04;
  const botY   = H * 0.96;
  const unit   = Math.min(W, H) / 400;

  const bps = [];
  for (let i = 0; i < N_PAIRS; i++) {
    const frac  = i / (N_PAIRS - 1);
    const y     = topY + frac * (botY - topY);
    const theta = rotAngle + frac * Math.PI * 2 * TURNS;
    const depth = Math.cos(theta);          // -1 (back) to +1 (front)
    const x1    = cx + radius * Math.sin(theta);
    const x2    = cx - radius * Math.sin(theta);
    bps.push({ y, theta, depth, x1, x2, frac });
  }

  // Sort back-to-front
  bps.sort((a, b) => a.depth - b.depth);

  // ── Spark spawn ──────────────────────────────────────
  sparkAccum += p.particles * dt;
  while (sparkAccum > 1) {
    sparkAccum -= 1;
    const bp = bps[~~(Math.random() * N_PAIRS)];
    spawnSpark(Math.random() < 0.5 ? bp.x1 : bp.x2, bp.y);
  }

  // ── Draw sparks ──────────────────────────────────────
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < MAX_SPARKS; i++) {
    if (sml[i] === 0) continue;
    slife[i] += dt;
    if (slife[i] >= sml[i]) { sml[i] = 0; continue; }
    const t  = slife[i] / sml[i];
    const a  = (1 - t) * 0.7;
    sx[i]   += svx[i] * dt;
    sy[i]   += svy[i] * dt;
    svy[i]  += 60 * dt;      // gravity
    const r = unit * 1.5 * (1 - t * 0.7);
    ctx.beginPath();
    ctx.arc(sx[i], sy[i], r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${~~p.cr2},${~~p.cg2},${~~p.cb2},${a})`;
    ctx.fill();
  }

  // ── Draw helix ───────────────────────────────────────
  ctx.globalCompositeOperation = 'lighter';

  for (const bp of bps) {
    const tf = (bp.depth + 1) * 0.5;    // 0 = back, 1 = front
    const alpha = 0.25 + tf * 0.75;
    const dotR  = unit * (1.5 + tf * 3.5);
    const baseAlpha = alpha * (curState === 'idle' ? 0.6 + pulse * 0.4 : 1);

    // Scan highlight (waiting)
    let scanBoost = 0;
    if (p.scanLine) {
      const dist = Math.abs(bp.frac - scanY);
      scanBoost  = Math.max(0, 1 - dist * 12) * 0.8;
    }

    const r1 = ~~p.cr1, g1 = ~~p.cg1, b1 = ~~p.cb1;
    const r2 = ~~p.cr2, g2 = ~~p.cg2, b2 = ~~p.cb2;

    // Base pair connecting line
    const lineA = baseAlpha * 0.35 * tf + scanBoost * 0.5;
    if (lineA > 0.01) {
      const lg = ctx.createLinearGradient(bp.x1, bp.y, bp.x2, bp.y);
      lg.addColorStop(0,   `rgba(${r1},${g1},${b1},${lineA})`);
      lg.addColorStop(0.5, `rgba(255,255,255,${lineA * 0.6 + scanBoost * 0.4})`);
      lg.addColorStop(1,   `rgba(${r2},${g2},${b2},${lineA})`);
      ctx.lineWidth  = unit * (0.8 + tf * 1.2);
      ctx.strokeStyle = lg;
      ctx.beginPath();
      ctx.moveTo(bp.x1, bp.y);
      ctx.lineTo(bp.x2, bp.y);
      ctx.stroke();
    }

    // Strand dots with glow
    for (const [dx, rx, gx, bx] of [[bp.x1, r1, g1, b1], [bp.x2, r2, g2, b2]]) {
      const a = baseAlpha + scanBoost;
      const glow = ctx.createRadialGradient(dx, bp.y, 0, dx, bp.y, dotR * 2.5);
      glow.addColorStop(0,   `rgba(255,255,255,${a * 0.9})`);
      glow.addColorStop(0.3, `rgba(${rx},${gx},${bx},${a})`);
      glow.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.arc(dx, bp.y, dotR * 2.5, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();
    }
  }

  ctx.globalCompositeOperation = 'source-over';
}

// ── State ─────────────────────────────────────────────
function handleState(s) {
  if (!PRESETS[s] || s === curState) return;
  curState = s;
}

window.addEventListener('message', ({ data: d }) => { if (d?.state) handleState(d.state); });

if (window.self === window.top) {
  (async function poll() {
    try { const d = await (await fetch('/api/status')).json(); if (d?.state) handleState(d.state); } catch {}
    setTimeout(poll, 1000);
  })();
}

handleState('idle');
requestAnimationFrame(frame);
</script>
</body>
</html>
