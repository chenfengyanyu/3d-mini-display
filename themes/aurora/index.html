<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora — Claude Status</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #03060f; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let W, H;
const MAX_RIBBONS = 7;
let ribbons = [];

function resize() {
  W = canvas.width  = canvas.offsetWidth;
  H = canvas.height = canvas.offsetHeight;
  initRibbons();
}
window.addEventListener('resize', resize);

// ── State configs ─────────────────────────────────
const CFGS = {
  busy:    { count: 7, speed: 1.9, amp: 0.17, thick: 0.095, r: 255, g:  90, b:  50 },
  waiting: { count: 3, speed: 0.85, amp: 0.10, thick: 0.065, r: 255, g: 190, b:  35 },
  idle:    { count: 2, speed: 0.32, amp: 0.055, thick: 0.042, r:  35, g: 185, b: 110 },
};
let cfg = { ...CFGS.idle }, tgt = { ...CFGS.idle };
function lerp(a, b, k) { return a + (b - a) * k; }

function initRibbons() {
  ribbons = Array.from({ length: MAX_RIBBONS }, (_, i) => ({
    baseY:  H * (0.12 + i * 0.115 + (Math.random() - 0.5) * 0.04),
    freq1:  0.0020 + Math.random() * 0.0018,
    freq2:  0.0045 + Math.random() * 0.0025,
    phase:  Math.random() * Math.PI * 2,
    pSpeed: 0.28 + Math.random() * 0.45,   // phase speed multiplier
    amp:    0,
    thick:  0,
    alpha:  0,
    // Slight hue offset per ribbon (±20% on each channel)
    rMul:   0.85 + Math.random() * 0.30,
    gMul:   0.85 + Math.random() * 0.30,
    bMul:   0.85 + Math.random() * 0.30,
  }));
}

// ── Draw ribbon as filled wave path ──────────────
function drawRibbon(r, cr, cg, cb) {
  if (r.alpha < 0.005 || r.thick < 1) return;
  const rc = Math.min(255, Math.round(cr * r.rMul));
  const gc = Math.min(255, Math.round(cg * r.gMul));
  const bc = Math.min(255, Math.round(cb * r.bMul));

  const step = 6;
  // Build wave y for top edge
  function waveY(x) {
    return r.baseY
      + Math.sin(x * r.freq1 + r.phase) * r.amp
      + Math.sin(x * r.freq2 + r.phase * 1.3 + 0.8) * r.amp * 0.42;
  }

  // Top edge + bottom edge path
  ctx.beginPath();
  for (let x = 0; x <= W; x += step) {
    const y = waveY(x);
    x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  for (let x = W; x >= 0; x -= step) {
    ctx.lineTo(x, waveY(x) + r.thick);
  }
  ctx.closePath();

  // Vertical gradient: transparent → color → transparent
  const cy  = r.baseY + r.thick * 0.5;
  const half = r.thick * 0.75;
  const grad = ctx.createLinearGradient(0, cy - half, 0, cy + half);
  const a    = r.alpha;
  grad.addColorStop(0,    `rgba(${rc},${gc},${bc},0)`);
  grad.addColorStop(0.25, `rgba(${rc},${gc},${bc},${(a * 0.55).toFixed(2)})`);
  grad.addColorStop(0.5,  `rgba(${rc},${gc},${bc},${(a * 0.90).toFixed(2)})`);
  grad.addColorStop(0.75, `rgba(${rc},${gc},${bc},${(a * 0.55).toFixed(2)})`);
  grad.addColorStop(1,    `rgba(${rc},${gc},${bc},0)`);
  ctx.fillStyle = grad;
  ctx.fill();
}

// ── Draw ──────────────────────────────────────────
let lastTs = 0;
function animate(ts) {
  requestAnimationFrame(animate);
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  const k = 1 - Math.pow(0.03, dt);
  cfg.count = lerp(cfg.count, tgt.count, k);
  cfg.speed = lerp(cfg.speed, tgt.speed, k);
  cfg.amp   = lerp(cfg.amp,   tgt.amp,   k * 0.4);
  cfg.thick = lerp(cfg.thick, tgt.thick, k * 0.4);
  cfg.r = lerp(cfg.r, tgt.r, k); cfg.g = lerp(cfg.g, tgt.g, k); cfg.b = lerp(cfg.b, tgt.b, k);

  // Dark sky background (star-like black-blue)
  ctx.fillStyle = 'rgba(3,6,15,0.88)';
  ctx.fillRect(0, 0, W, H);

  const cr = Math.round(cfg.r), cg = Math.round(cfg.g), cb = Math.round(cfg.b);
  const activeCount = Math.round(cfg.count);

  // Use screen blend for additive light mixing
  ctx.globalCompositeOperation = 'screen';

  ribbons.forEach((r, i) => {
    const shouldBeActive = i < activeCount;
    r.alpha = lerp(r.alpha, shouldBeActive ? 0.88 : 0,   k * 0.6);
    r.amp   = lerp(r.amp,   shouldBeActive ? H * cfg.amp : H * 0.02, k * 0.3);
    r.thick = lerp(r.thick, shouldBeActive ? H * cfg.thick : 4, k * 0.3);
    r.phase += r.pSpeed * cfg.speed * dt;
    drawRibbon(r, cr, cg, cb);
  });

  ctx.globalCompositeOperation = 'source-over';

  // Subtle star field
  if (Math.random() < 0.05) {
    const sx = Math.random() * W, sy = Math.random() * H * 0.4;
    ctx.fillStyle = `rgba(200,220,255,${Math.random() * 0.3})`;
    ctx.beginPath();
    ctx.arc(sx, sy, 0.8, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ── State machine ─────────────────────────────────
let lastState = null;
function applyState(s) { tgt = { ...CFGS[s] }; }
function setState(s) {
  if (s === lastState) return;
  lastState = s;
  applyState(s);
}
window.addEventListener('message', ({ data: d }) => { if (d?.state) setState(d.state); });
async function poll() { try { const d = await (await fetch('/api/status')).json(); if (d?.state) setState(d.state); } catch {} }
if (window.self === window.top) { setInterval(poll, 1000); poll(); }
resize();
requestAnimationFrame(animate);
setState('idle', null);
</script>
</body>
</html>
