<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Status Monitor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #020617;
    overflow: hidden;
    font-family: 'JetBrains Mono', monospace;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ─── State ────────────────────────────────────────────────────────────────────
let curState = 'idle';
let sessionStartBusy = null;
let totalBusyMs = 0;
let lastBusyStart = null;
let busyCount = 0;
let stateHistory = [];   // [{state, ts}]
let focusWindow = [];    // [{state, start, end|null}]

// localStorage key for today's total busy time
function todayKey() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `dashboard_today_${y}-${m}-${day}`;
}

// Load today's saved busy time
let savedTodayMs = 0;
try {
  const v = localStorage.getItem(todayKey());
  if (v !== null) savedTodayMs = parseInt(v, 10) || 0;
} catch {}

function saveTodayMs(ms) {
  try { localStorage.setItem(todayKey(), String(ms)); } catch {}
}

// Compute today total: saved + current session busy
function getTodayTotalMs() {
  let extra = totalBusyMs;
  if (lastBusyStart !== null) extra += Date.now() - lastBusyStart;
  return savedTodayMs + extra;
}

// Focus: busy fraction in last 5 minutes
function getFocusPct() {
  const now = Date.now();
  const windowMs = 5 * 60 * 1000;
  const cutoff = now - windowMs;
  let busyMs = 0;
  for (const seg of focusWindow) {
    const start = Math.max(seg.start, cutoff);
    const end = seg.end !== null ? seg.end : now;
    if (end > cutoff) {
      busyMs += Math.max(0, end - start);
    }
  }
  // Clean old segments
  focusWindow = focusWindow.filter(s => (s.end === null) || (s.end > cutoff));
  return Math.min(100, (busyMs / windowMs) * 100);
}

// ─── State Handler ────────────────────────────────────────────────────────────
function handleState(s) {
  if (!['busy', 'waiting', 'idle'].includes(s)) return;
  if (s === curState) return;

  const now = Date.now();

  // Leaving busy
  if (curState === 'busy') {
    if (lastBusyStart !== null) {
      const elapsed = now - lastBusyStart;
      totalBusyMs += elapsed;
      saveTodayMs(savedTodayMs + totalBusyMs);
      // Close focus segment
      if (focusWindow.length > 0 && focusWindow[focusWindow.length - 1].end === null) {
        focusWindow[focusWindow.length - 1].end = now;
      }
    }
    lastBusyStart = null;
  }

  // Entering busy
  if (s === 'busy') {
    if (sessionStartBusy === null) sessionStartBusy = now;
    lastBusyStart = now;
    busyCount++;
    // Open focus segment
    focusWindow.push({ state: 'busy', start: now, end: null });
  }

  stateHistory.push({ state: s, ts: now });
  if (stateHistory.length > 60) stateHistory.shift();

  curState = s;
}

// ─── Message listener ─────────────────────────────────────────────────────────
window.addEventListener('message', ({ data: d }) => {
  if (d && d.state) handleState(d.state);
  if (d && d.lastEvent) { /* optional: could use for extra info */ }
});

// ─── Poll when standalone ─────────────────────────────────────────────────────
if (window.self === window.top) {
  (async function poll() {
    try {
      const d = await (await fetch('/api/status')).json();
      if (d && d.state) handleState(d.state);
    } catch {}
    setTimeout(poll, 250);
  })();
}

// ─── Canvas Renderer ──────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = canvas.offsetWidth * devicePixelRatio;
  canvas.height = canvas.offsetHeight * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
}
window.addEventListener('resize', resize);
resize();

// Colors
const COLORS = {
  bg: '#020617',
  panelBg: 'rgba(15, 23, 42, 0.85)',
  panelBorder: '#1e293b',
  busy: '#ef4444',
  waiting: '#f59e0b',
  idle: '#22c55e',
  text: '#f8fafc',
  secondary: '#94a3b8',
  grid: 'rgba(30, 41, 59, 0.4)',
  divider: '#1e293b',
  barEmpty: '#0f172a',
};

function stateColor(s) {
  if (s === 'busy') return COLORS.busy;
  if (s === 'waiting') return COLORS.waiting;
  return COLORS.idle;
}

function formatDuration(ms) {
  if (ms < 0) ms = 0;
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function getSessionTime() {
  if (sessionStartBusy === null) return '--:--:--';
  return formatDuration(Date.now() - sessionStartBusy);
}

function getTimeStr() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}

function getDateStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// Draw grid background
function drawGrid(W, H) {
  ctx.strokeStyle = COLORS.grid;
  ctx.lineWidth = 0.5;
  const spacing = 28;
  for (let x = 0; x < W; x += spacing) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += spacing) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

// Draw panel with corner brackets
function drawPanel(x, y, w, h, label) {
  // Background
  ctx.fillStyle = COLORS.panelBg;
  ctx.fillRect(x, y, w, h);

  // Border
  ctx.strokeStyle = COLORS.panelBorder;
  ctx.lineWidth = 1;
  ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);

  // Corner brackets
  const bs = 10; // bracket size
  ctx.strokeStyle = stateColor(curState);
  ctx.lineWidth = 1.5;
  // TL
  ctx.beginPath(); ctx.moveTo(x + bs, y); ctx.lineTo(x, y); ctx.lineTo(x, y + bs); ctx.stroke();
  // TR
  ctx.beginPath(); ctx.moveTo(x + w - bs, y); ctx.lineTo(x + w, y); ctx.lineTo(x + w, y + bs); ctx.stroke();
  // BL
  ctx.beginPath(); ctx.moveTo(x, y + h - bs); ctx.lineTo(x, y + h); ctx.lineTo(x + bs, y + h); ctx.stroke();
  // BR
  ctx.beginPath(); ctx.moveTo(x + w - bs, y + h); ctx.lineTo(x + w, y + h); ctx.lineTo(x + w, y + h - bs); ctx.stroke();

  // Label tab
  if (label) {
    const pad = 6;
    ctx.font = '9px JetBrains Mono, monospace';
    const tw = ctx.measureText(label).width;
    ctx.fillStyle = stateColor(curState);
    ctx.fillRect(x + 12, y - 1, tw + pad * 2, 12);
    ctx.fillStyle = '#020617';
    ctx.fillText(label, x + 12 + pad, y + 8);
  }
}

// Draw header section
function drawHeader(W, headerH) {
  const col = stateColor(curState);
  const cx = W / 2;
  const cy = headerH / 2;

  // Title
  ctx.font = 'bold 11px JetBrains Mono, monospace';
  ctx.fillStyle = COLORS.secondary;
  ctx.textAlign = 'center';
  ctx.fillText('CLAUDE CODE STATUS MONITOR', cx, 18);

  // Scanline accent under title
  ctx.strokeStyle = COLORS.panelBorder;
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cx - 160, 24); ctx.lineTo(cx + 160, 24); ctx.stroke();

  // State circle (pulsing via alpha)
  const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 400);
  const circR = 14;
  const circX = cx - 90;
  const circY = cy + 10;

  // Outer glow
  const grd = ctx.createRadialGradient(circX, circY, 0, circX, circY, circR * 2.5);
  grd.addColorStop(0, col.replace(')', `, ${pulse * 0.5})`).replace('rgb', 'rgba').replace('#', 'rgba(').replace('ef4444', '239,68,68').replace('f59e0b', '245,158,11').replace('22c55e', '34,197,94'));
  // Simpler glow:
  ctx.save();
  ctx.globalAlpha = pulse * 0.25;
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.arc(circX, circY, circR * 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Circle fill
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.arc(circX, circY, circR, 0, Math.PI * 2);
  ctx.fill();

  // Inner highlight
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.arc(circX - 4, circY - 4, circR * 0.4, 0, Math.PI * 2);
  ctx.fill();

  // State label
  ctx.font = 'bold 28px JetBrains Mono, monospace';
  ctx.fillStyle = col;
  ctx.textAlign = 'left';
  ctx.fillText(curState.toUpperCase(), circX + circR + 14, circY + 10);

  // Decorative lines left/right of circle
  ctx.strokeStyle = COLORS.panelBorder;
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(20, circY); ctx.lineTo(circX - circR - 10, circY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + 110, circY); ctx.lineTo(W - 20, circY); ctx.stroke();
}

// Draw clock panel
function drawClock(x, y, w, h) {
  drawPanel(x, y, w, h, 'CLOCK');
  const col = stateColor(curState);
  const cx = x + w / 2;

  // Time
  ctx.font = 'bold 32px JetBrains Mono, monospace';
  ctx.fillStyle = col;
  ctx.textAlign = 'center';
  ctx.fillText(getTimeStr(), cx, y + h / 2 + 4);

  // Date
  ctx.font = '12px JetBrains Mono, monospace';
  ctx.fillStyle = COLORS.secondary;
  ctx.fillText(getDateStr(), cx, y + h / 2 + 24);

  // Decorative tick marks around time
  ctx.strokeStyle = col;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.3;
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2 - Math.PI / 2;
    const r1 = 52, r2 = 58;
    const ex = cx + Math.cos(angle) * r1;
    const ey = y + h / 2 - 10 + Math.sin(angle) * r1;
    const ex2 = cx + Math.cos(angle) * r2;
    const ey2 = y + h / 2 - 10 + Math.sin(angle) * r2;
    ctx.beginPath(); ctx.moveTo(ex, ey); ctx.lineTo(ex2, ey2); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

// Draw session stats panel
function drawStats(x, y, w, h) {
  drawPanel(x, y, w, h, 'SESSION STATS');

  const sessionMs = sessionStartBusy !== null ? Date.now() - sessionStartBusy : -1;
  const todayMs = getTodayTotalMs();
  const busyMs = totalBusyMs + (lastBusyStart !== null ? Date.now() - lastBusyStart : 0);

  const rows = [
    { label: 'SESSION TIME', value: getSessionTime(), note: 'since first busy' },
    { label: 'TODAY TOTAL', value: formatDuration(todayMs), note: 'busy time today' },
    { label: 'BUSY COUNT', value: String(busyCount), note: 'activations' },
    { label: 'BUSY TIME', value: formatDuration(busyMs), note: 'this session' },
  ];

  const rowH = (h - 30) / rows.length;
  rows.forEach((row, i) => {
    const ry = y + 28 + i * rowH;
    const rx = x + 14;

    // Separator
    if (i > 0) {
      ctx.strokeStyle = COLORS.divider;
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x + 10, ry - 2); ctx.lineTo(x + w - 10, ry - 2); ctx.stroke();
    }

    // Label
    ctx.font = '9px JetBrains Mono, monospace';
    ctx.fillStyle = COLORS.secondary;
    ctx.textAlign = 'left';
    ctx.fillText(row.label, rx, ry + 12);

    // Value
    ctx.font = 'bold 20px JetBrains Mono, monospace';
    ctx.fillStyle = stateColor(curState);
    ctx.fillText(row.value, rx, ry + 34);

    // Note
    ctx.font = '9px JetBrains Mono, monospace';
    ctx.fillStyle = 'rgba(148,163,184,0.5)';
    ctx.fillText(row.note, rx, ry + 48);
  });
}

// Draw focus meter panel
function drawFocus(x, y, w, h) {
  drawPanel(x, y, w, h, 'FOCUS');
  const col = stateColor(curState);
  const pct = getFocusPct();
  const cx = x + w / 2;

  // Label
  ctx.font = '9px JetBrains Mono, monospace';
  ctx.fillStyle = COLORS.secondary;
  ctx.textAlign = 'center';
  ctx.fillText('LAST 5 MIN', cx, y + 28);

  // Vertical bar
  const barX = cx - 14;
  const barW = 28;
  const barTop = y + 40;
  const barBot = y + h - 50;
  const barH = barBot - barTop;
  const filledH = (pct / 100) * barH;

  // Background bar
  ctx.fillStyle = COLORS.barEmpty;
  ctx.fillRect(barX, barTop, barW, barH);

  // Border
  ctx.strokeStyle = COLORS.panelBorder;
  ctx.lineWidth = 1;
  ctx.strokeRect(barX, barTop, barW, barH);

  // Filled portion
  if (filledH > 0) {
    // Gradient fill
    const grad = ctx.createLinearGradient(barX, barBot - filledH, barX, barBot);
    grad.addColorStop(0, col);
    grad.addColorStop(1, col + '88');
    ctx.fillStyle = grad;
    ctx.fillRect(barX, barBot - filledH, barW, filledH);

    // Shimmer line at top of fill
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(barX, barBot - filledH);
    ctx.lineTo(barX + barW, barBot - filledH);
    ctx.stroke();
  }

  // Tick marks on bar
  ctx.strokeStyle = COLORS.panelBorder;
  ctx.lineWidth = 1;
  for (let t = 1; t < 5; t++) {
    const ty = barTop + (t / 5) * barH;
    ctx.beginPath(); ctx.moveTo(barX - 3, ty); ctx.lineTo(barX, ty); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(barX + barW, ty); ctx.lineTo(barX + barW + 3, ty); ctx.stroke();
    ctx.font = '7px JetBrains Mono, monospace';
    ctx.fillStyle = 'rgba(148,163,184,0.4)';
    ctx.textAlign = 'right';
    ctx.fillText(`${100 - t * 20}%`, barX - 5, ty + 3);
  }

  // Percentage text
  ctx.font = 'bold 16px JetBrains Mono, monospace';
  ctx.fillStyle = col;
  ctx.textAlign = 'center';
  ctx.fillText(`${Math.round(pct)}%`, cx, y + h - 28);

  ctx.font = '9px JetBrains Mono, monospace';
  ctx.fillStyle = COLORS.secondary;
  ctx.fillText('FOCUS', cx, y + h - 14);
}

// Draw history strip
function drawHistory(x, y, w, h) {
  drawPanel(x, y, w, h, 'HISTORY (last 60)');

  const pad = 14;
  const stripW = w - pad * 2;
  const count = 60;
  const rectW = Math.floor(stripW / count) - 1;
  const rectH = h - 30;
  const startX = x + pad;
  const stripY = y + 18;

  // Draw empty slots
  for (let i = 0; i < count; i++) {
    const rx = startX + i * (rectW + 1);
    ctx.fillStyle = COLORS.barEmpty;
    ctx.fillRect(rx, stripY, rectW, rectH);
  }

  // Fill with history (most recent on right)
  const hist = stateHistory.slice(-count);
  const offset = count - hist.length;
  hist.forEach((entry, i) => {
    const rx = startX + (offset + i) * (rectW + 1);
    ctx.fillStyle = stateColor(entry.state);
    ctx.fillRect(rx, stripY, rectW, rectH);

    // Highlight most recent
    if (i === hist.length - 1) {
      ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      ctx.lineWidth = 1;
      ctx.strokeRect(rx, stripY, rectW, rectH);
    }
  });

  // Legend
  const legendX = x + w - 130;
  const legendY = stripY + rectH / 2 + 4;
  const items = [
    { label: 'BUSY', col: COLORS.busy },
    { label: 'WAIT', col: COLORS.waiting },
    { label: 'IDLE', col: COLORS.idle },
  ];
  items.forEach((item, i) => {
    const lx = legendX + i * 42;
    ctx.fillStyle = item.col;
    ctx.fillRect(lx, legendY - 6, 8, 8);
    ctx.font = '8px JetBrains Mono, monospace';
    ctx.fillStyle = COLORS.secondary;
    ctx.textAlign = 'left';
    ctx.fillText(item.label, lx + 10, legendY + 2);
  });
}

// ─── Main draw loop ───────────────────────────────────────────────────────────
function draw() {
  const W = canvas.offsetWidth;
  const H = canvas.offsetHeight;

  // Reset transform for new frame
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(devicePixelRatio, devicePixelRatio);

  // Background
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, W, H);

  // Grid
  drawGrid(W, H);

  const pad = 12;
  const headerH = 80;
  const historyH = 44;
  const midY = headerH + pad;
  const midH = H - headerH - historyH - pad * 3;
  const bottomY = H - historyH - pad;

  // Horizontal divider after header
  ctx.strokeStyle = COLORS.panelBorder;
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(pad, headerH + 4); ctx.lineTo(W - pad, headerH + 4); ctx.stroke();

  // Header panel
  drawPanel(pad, pad, W - pad * 2, headerH - pad, null);
  drawHeader(W, headerH);

  // Middle columns
  const colW = Math.floor((W - pad * 4) / 3);
  const clockW = colW;
  const statsW = colW;
  const focusW = W - pad * 4 - clockW - statsW;

  drawClock(pad, midY, clockW, midH);
  drawStats(pad * 2 + clockW, midY, statsW, midH);
  drawFocus(pad * 3 + clockW + statsW, midY, focusW, midH);

  // History strip
  drawHistory(pad, bottomY, W - pad * 2, historyH);

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
