<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STARSHIP OS v2.4 — HUD</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
  #scanlines {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    z-index: 10;
  }
  #edge-pulse {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 9;
    opacity: 0;
    box-shadow: inset 0 0 80px 20px rgba(255,51,51,0);
    transition: none;
  }
</style>
</head>
<body>
<canvas id="hud"></canvas>
<div id="scanlines"></div>
<div id="edge-pulse"></div>
<script>
// ─── State machine ────────────────────────────────────────────────────────────
let curState = 'idle';
function handleState(s) {
  if (!['busy','waiting','idle'].includes(s) || s === curState) return;
  curState = s;
}
window.addEventListener('message', ({ data: d }) => { if (d?.state) handleState(d.state); });
if (window.self === window.top) {
  (async function poll() {
    try { const d = await (await fetch('/api/status')).json(); if (d?.state) handleState(d.state); } catch {}
    setTimeout(poll, 1000);
  })();
}

// ─── Canvas setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('hud');
const ctx = canvas.getContext('2d');
const edgePulse = document.getElementById('edge-pulse');

function resize() {
  const _dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * _dpr;
  canvas.height = window.innerHeight * _dpr;
  ctx.setTransform(_dpr, 0, 0, _dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ─── Color palette ────────────────────────────────────────────────────────────
const COLORS = {
  cyan:   '#00ffff',
  green:  '#00ff88',
  red:    '#ff3333',
  amber:  '#fbbf24',
  bg:     '#000000',
  panel:  'rgba(0,255,255,0.04)',
  grid:   'rgba(0,255,255,0.15)',
  dim:    'rgba(0,255,255,0.35)',
};

function stateColor(state) {
  if (state === 'busy')    return COLORS.red;
  if (state === 'waiting') return COLORS.amber;
  return COLORS.cyan;
}

// ─── Lerp helpers ─────────────────────────────────────────────────────────────
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}
function lerpColor(a, b, t) {
  const [ar,ag,ab] = hexToRgb(a);
  const [br,bg,bb] = hexToRgb(b);
  const r = Math.round(ar + (br-ar)*t);
  const g = Math.round(ag + (bg-ag)*t);
  const bv = Math.round(ab + (bb-ab)*t);
  return `rgb(${r},${g},${bv})`;
}
function lerp(a, b, t) { return a + (b - a) * t; }

// ─── Animated state values ────────────────────────────────────────────────────
let displayColor = COLORS.cyan;
let targetColor  = COLORS.cyan;
let colorT = 1;

let powerLevel = 0.25;       // 0..1 target
let powerDisplay = 0.25;

let radarBlips = [];
let navCoords = { x: 0, y: 0, z: 0 };
let navTimer = 0;

// ─── Radar blips ──────────────────────────────────────────────────────────────
function generateBlips(count) {
  const blips = [];
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist  = Math.random() * 0.85;
    blips.push({ angle, dist, age: Math.random(), speed: 0.3 + Math.random() * 0.5, size: 1.5 + Math.random() * 2 });
  }
  return blips;
}
radarBlips = generateBlips(6);

// ─── Stars for hyperspace ─────────────────────────────────────────────────────
const STAR_COUNT = 120;
let stars = [];
function initStars() {
  stars = [];
  for (let i = 0; i < STAR_COUNT; i++) {
    const angle = Math.random() * Math.PI * 2;
    const r = 0.3 + Math.random() * 0.7;
    stars.push({
      angle,
      r,
      speed: 0.0002 + Math.random() * 0.0005,
      size:  0.5 + Math.random() * 1.5,
      alpha: Math.random(),
    });
  }
}
initStars();

// ─── System status list ───────────────────────────────────────────────────────
const SYSTEMS = ['NAV-CORE','SHIELD-GEN','WARP-DRIVE','LIFE-SUPPORT','COMMS','SENSORS','HULL-INTEGRITY','PROPULSION'];
function systemStatus(state) {
  return SYSTEMS.map((name, i) => {
    let status;
    if (state === 'busy') {
      status = i < 3 ? 'ALERT' : i < 5 ? 'WARNING' : 'OK';
    } else if (state === 'waiting') {
      status = i < 2 ? 'WARNING' : 'OK';
    } else {
      status = 'OK';
    }
    return { name, status };
  });
}

// ─── Animation clock ──────────────────────────────────────────────────────────
let t = 0;
let radarAngle = 0;
let reticleRotation = 0;
let alertFlash = 0;
let edgePulseAlpha = 0;
let lastTimestamp = 0;

// ─── Draw helpers ─────────────────────────────────────────────────────────────
function drawText(text, x, y, size, color, align='left', alpha=1) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.font = `${size}px 'JetBrains Mono', 'Courier New', monospace`;
  ctx.textAlign = align;
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y);
  ctx.restore();
}

function drawGlow(color, blur=18) {
  ctx.shadowColor = color;
  ctx.shadowBlur  = blur;
}

function clearGlow() {
  ctx.shadowBlur = 0;
  ctx.shadowColor = 'transparent';
}

// ─── Corner brackets ──────────────────────────────────────────────────────────
function drawCornerBrackets(W, H, color) {
  const sz = 36, thick = 2;
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = thick;
  drawGlow(color, 10);
  // TL
  ctx.beginPath(); ctx.moveTo(12+sz,12); ctx.lineTo(12,12); ctx.lineTo(12,12+sz); ctx.stroke();
  // TR
  ctx.beginPath(); ctx.moveTo(W-12-sz,12); ctx.lineTo(W-12,12); ctx.lineTo(W-12,12+sz); ctx.stroke();
  // BL
  ctx.beginPath(); ctx.moveTo(12+sz,H-12); ctx.lineTo(12,H-12); ctx.lineTo(12,H-12-sz); ctx.stroke();
  // BR
  ctx.beginPath(); ctx.moveTo(W-12-sz,H-12); ctx.lineTo(W-12,H-12); ctx.lineTo(W-12,H-12-sz); ctx.stroke();
  clearGlow();
  ctx.restore();
}

// ─── Top status bar ───────────────────────────────────────────────────────────
function drawTopBar(W, color) {
  const y = 30;
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.4;
  ctx.beginPath(); ctx.moveTo(0, 52); ctx.lineTo(W, 52); ctx.stroke();
  ctx.restore();

  drawText('STARSHIP OS v2.4', 24, y, 13, color, 'left', 0.9);
  drawText('UNIT 7742-α', W - 24, y, 13, color, 'right', 0.9);

  // Real time
  const now = new Date();
  const ts = now.toTimeString().slice(0,8);
  drawText(ts, W/2, y, 14, color, 'center', 1);

  // Red alert flashing
  if (curState === 'busy') {
    const flash = Math.sin(t * 8) > 0;
    if (flash) {
      ctx.save();
      drawGlow(COLORS.red, 20);
      drawText('⚠ RED ALERT ⚠', W/2, 72, 15, COLORS.red, 'center', 1);
      clearGlow();
      ctx.restore();
    }
  }
}

// ─── Targeting reticle (center) ───────────────────────────────────────────────
function drawReticle(cx, cy, radius, color) {
  ctx.save();

  // Outer rotating dashed ring
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(reticleRotation);
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = 0.6;
  ctx.setLineDash([12, 8]);
  drawGlow(color, 8);
  ctx.beginPath();
  ctx.arc(0, 0, radius, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);
  clearGlow();
  ctx.restore();

  // Second ring (counter-rotate)
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(-reticleRotation * 0.6);
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.35;
  ctx.setLineDash([4, 16]);
  ctx.beginPath();
  ctx.arc(0, 0, radius * 0.78, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // Mid ring
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = 0.5;
  drawGlow(color, 12);
  ctx.beginPath();
  ctx.arc(cx, cy, radius * 0.55, 0, Math.PI * 2);
  ctx.stroke();

  // Inner ring
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.7;
  ctx.beginPath();
  ctx.arc(cx, cy, radius * 0.28, 0, Math.PI * 2);
  ctx.stroke();
  clearGlow();

  // Crosshair lines
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.5;
  const gap = radius * 0.32;
  // horizontal
  ctx.beginPath(); ctx.moveTo(cx - radius, cy); ctx.lineTo(cx - gap, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + gap, cy);    ctx.lineTo(cx + radius, cy); ctx.stroke();
  // vertical
  ctx.beginPath(); ctx.moveTo(cx, cy - radius); ctx.lineTo(cx, cy - gap); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, cy + gap);    ctx.lineTo(cx, cy + radius); ctx.stroke();

  // Tick marks on outer ring
  ctx.globalAlpha = 0.4;
  for (let i = 0; i < 36; i++) {
    const a = (i / 36) * Math.PI * 2;
    const inner = i % 3 === 0 ? radius - 12 : radius - 6;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * inner, cy + Math.sin(a) * inner);
    ctx.lineTo(cx + Math.cos(a) * radius, cy + Math.sin(a) * radius);
    ctx.stroke();
  }

  // Center dot
  ctx.globalAlpha = 1;
  drawGlow(color, 20);
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(cx, cy, 4, 0, Math.PI * 2);
  ctx.fill();
  clearGlow();

  // State label
  const label = curState === 'busy' ? 'PROCESSING' : curState === 'waiting' ? 'STANDBY' : 'CRUISE MODE';
  ctx.save();
  drawGlow(color, 16);
  drawText(label, cx, cy + radius * 0.47, 14, color, 'center', 1);
  clearGlow();
  ctx.restore();

  // Targeting coordinates below label
  ctx.globalAlpha = 0.55;
  drawText(`TGT: ${(Math.sin(t*0.7)*180).toFixed(1)}° / ${(Math.cos(t*0.5)*90).toFixed(1)}°`, cx, cy + radius * 0.47 + 22, 10, color, 'center');

  ctx.restore();
}

// ─── Radar panel (left) ───────────────────────────────────────────────────────
function drawRadar(cx, cy, r, color) {
  ctx.save();

  // Background circle
  ctx.fillStyle = 'rgba(0,40,20,0.35)';
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();

  // Grid lines
  ctx.strokeStyle = 'rgba(0,255,136,0.18)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cx-r, cy); ctx.lineTo(cx+r, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, cy-r); ctx.lineTo(cx, cy+r); ctx.stroke();

  // Concentric circles
  for (let i = 1; i <= 3; i++) {
    ctx.strokeStyle = `rgba(0,255,136,${0.12 + i*0.05})`;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(cx, cy, r*(i/3), 0, Math.PI*2); ctx.stroke();
  }

  // Sweep line + trail
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, r, radarAngle - Math.PI*0.35, radarAngle);
  ctx.closePath();
  const grad = ctx.createConicalGradient ? null : null;
  ctx.fillStyle = 'rgba(0,255,136,0.12)';
  ctx.fill();

  ctx.strokeStyle = color === COLORS.red ? COLORS.red : COLORS.green;
  ctx.lineWidth = 2;
  drawGlow(COLORS.green, 10);
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + Math.cos(radarAngle)*r, cy + Math.sin(radarAngle)*r);
  ctx.stroke();
  clearGlow();
  ctx.restore();

  // Clip to circle for blips
  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.clip();

  // Blips
  for (const blip of radarBlips) {
    const bx = cx + Math.cos(blip.angle) * blip.dist * r;
    const by = cy + Math.sin(blip.angle) * blip.dist * r;
    const pulse = 0.5 + 0.5 * Math.sin(t * blip.speed * 6 + blip.age * 10);
    const blipColor = color === COLORS.red ? COLORS.red : COLORS.green;
    ctx.fillStyle = blipColor;
    ctx.globalAlpha = 0.4 + 0.6 * pulse;
    drawGlow(blipColor, 8);
    ctx.beginPath();
    ctx.arc(bx, by, blip.size, 0, Math.PI*2);
    ctx.fill();
    clearGlow();
  }
  ctx.restore();

  // Border ring
  ctx.strokeStyle = color === COLORS.red ? COLORS.red : COLORS.green;
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.7;
  drawGlow(color === COLORS.red ? COLORS.red : COLORS.green, 10);
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();
  clearGlow();

  // Label
  ctx.globalAlpha = 1;
  drawText('RADAR', cx, cy - r - 16, 12, COLORS.green, 'center', 0.85);

  // Range indicator
  drawText(`RNG: ${(radarBlips.length * 120 + 400).toFixed(0)} km`, cx, cy + r + 16, 10, COLORS.green, 'center', 0.6);

  ctx.restore();
}

// ─── Power grid (right) ───────────────────────────────────────────────────────
function drawPowerGrid(x, y, w, h, color) {
  ctx.save();

  const cellCount = 10;
  const cellH = (h - 20) / cellCount - 4;
  const cellW = w;

  let litCount;
  if (curState === 'busy')    litCount = 10;
  else if (curState === 'waiting') litCount = 6 + Math.floor(Math.sin(t * 1.5) * 0.5 + 0.5);
  else litCount = 2 + Math.floor(Math.sin(t * 0.5) * 0.5 + 0.5);
  litCount = Math.max(1, Math.min(10, litCount));

  const pct = Math.round((powerDisplay) * 100);

  drawText('POWER', x + cellW/2, y - 16, 12, color, 'center', 0.85);

  for (let i = 0; i < cellCount; i++) {
    const cellIndex = cellCount - 1 - i; // top = high
    const cy2 = y + i * (cellH + 4);
    const lit = cellIndex < litCount;

    if (lit) {
      const pulse = 0.7 + 0.3 * Math.sin(t * (curState === 'busy' ? 8 : curState === 'waiting' ? 3 : 1) + i * 0.4);
      ctx.globalAlpha = pulse;
      drawGlow(color, 14);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.roundRect(x, cy2, cellW, cellH, 3);
      ctx.fill();
      clearGlow();

      // Inner highlight
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.roundRect(x+2, cy2+2, cellW-4, cellH*0.4, 2);
      ctx.fill();
    } else {
      ctx.globalAlpha = 0.12;
      ctx.strokeStyle = color;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(x, cy2, cellW, cellH, 3);
      ctx.stroke();
    }
  }

  ctx.globalAlpha = 1;
  drawText(`${pct}%`, x + cellW/2, y + h + 14, 13, color, 'center', 0.9);

  ctx.restore();
}

// ─── Navigation data (bottom-left) ────────────────────────────────────────────
function drawNavData(x, y, w, color) {
  ctx.save();

  // Panel bg
  ctx.fillStyle = 'rgba(0,255,255,0.03)';
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.5;
  ctx.strokeRect(x, y, w, 100);
  ctx.globalAlpha = 0.03;
  ctx.fillRect(x, y, w, 100);

  ctx.globalAlpha = 1;
  drawText('NAVIGATION', x + 10, y + 14, 11, color, 'left', 0.7);

  const sign = v => v >= 0 ? '+' : '';
  const fmt = v => `${sign(v)}${v.toFixed(2)}`;

  drawText(`X: ${fmt(navCoords.x)}`, x + 10, y + 38, 12, color, 'left', 0.9);
  drawText(`Y: ${fmt(navCoords.y)}`, x + 10, y + 58, 12, color, 'left', 0.9);
  drawText(`Z: ${fmt(navCoords.z)}`, x + 10, y + 78, 12, color, 'left', 0.9);

  // Speed
  const speed = curState === 'busy' ? 9842 + Math.floor(Math.random()*200) : curState === 'waiting' ? 4200 : 1337;
  drawText(`SPD: ${speed} km/s`, x + w/2 + 10, y + 58, 11, color, 'left', 0.6);

  ctx.restore();
}

// ─── System status (bottom-right) ─────────────────────────────────────────────
function drawSystemStatus(x, y, w, color) {
  ctx.save();

  const systems = systemStatus(curState);
  const rowH = 14;
  const totalH = systems.length * rowH + 24;

  ctx.fillStyle = 'rgba(0,255,255,0.03)';
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.5;
  ctx.strokeRect(x, y, w, totalH);
  ctx.globalAlpha = 0.03;
  ctx.fillRect(x, y, w, totalH);

  ctx.globalAlpha = 1;
  drawText('SYSTEMS', x + 10, y + 14, 11, color, 'left', 0.7);

  systems.forEach((sys, i) => {
    const sy = y + 28 + i * rowH;
    const statusColor = sys.status === 'ALERT' ? COLORS.red : sys.status === 'WARNING' ? COLORS.amber : COLORS.green;
    const alpha = sys.status === 'ALERT' ? (0.5 + 0.5 * Math.sin(t * 6 + i)) : 0.85;
    drawText(sys.name, x + 10, sy, 9, color, 'left', 0.55);
    drawText(sys.status, x + w - 10, sy, 9, statusColor, 'right', alpha);
  });

  ctx.restore();
}

// ─── Stars (hyperspace for idle) ──────────────────────────────────────────────
function drawStars(W, H, dt) {
  if (curState !== 'idle') return;
  const cx = W/2, cy = H/2;
  ctx.save();
  for (const star of stars) {
    star.r -= star.speed * dt * 60 * 0.003;
    if (star.r < 0.01) { star.r = 0.9 + Math.random() * 0.1; star.angle = Math.random() * Math.PI * 2; }
    const sx = cx + Math.cos(star.angle) * star.r * W * 0.6;
    const sy = cy + Math.sin(star.angle) * star.r * H * 0.6;
    const alpha = (1 - star.r) * 0.7;
    ctx.globalAlpha = Math.max(0, alpha);
    ctx.fillStyle = COLORS.cyan;
    ctx.beginPath();
    ctx.arc(sx, sy, star.size * (1 - star.r * 0.5), 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

// ─── Divider lines ────────────────────────────────────────────────────────────
function drawDividers(W, H, color) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.2;
  // Vertical dividers
  ctx.beginPath(); ctx.moveTo(W*0.28, 60); ctx.lineTo(W*0.28, H-10); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W*0.72, 60); ctx.lineTo(W*0.72, H-10); ctx.stroke();
  // Horizontal bottom divider
  ctx.beginPath(); ctx.moveTo(10, H*0.72); ctx.lineTo(W*0.28, H*0.72); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W*0.72, H*0.72); ctx.lineTo(W-10, H*0.72); ctx.stroke();
  ctx.restore();
}

// ─── Edge pulse (red alert) ───────────────────────────────────────────────────
function updateEdgePulse() {
  if (curState === 'busy') {
    edgePulseAlpha = 0.4 + 0.4 * Math.sin(t * 5);
    edgePulse.style.boxShadow = `inset 0 0 100px 30px rgba(255,51,51,${edgePulseAlpha})`;
    edgePulse.style.opacity = '1';
  } else {
    edgePulse.style.opacity = '0';
    edgePulse.style.boxShadow = 'none';
  }
}

// ─── Main render loop ─────────────────────────────────────────────────────────
function render(timestamp) {
  const dt = Math.min((timestamp - lastTimestamp) / 1000, 0.1);
  lastTimestamp = timestamp;
  t += dt;

  // Use CSS-pixel dimensions so coordinates match ctx.setTransform(dpr) scale
  const W = canvas.offsetWidth;
  const H = canvas.offsetHeight;

  // Update animated values
  radarAngle = (radarAngle + dt * 1.4) % (Math.PI * 2);
  reticleRotation = (reticleRotation + dt * 0.3) % (Math.PI * 2);

  const targetPower = curState === 'busy' ? 1.0 : curState === 'waiting' ? 0.65 : 0.25;
  powerDisplay = lerp(powerDisplay, targetPower, dt * 2);

  // Color transition
  targetColor = stateColor(curState);
  displayColor = lerpColor(displayColor, targetColor, Math.min(dt * 3, 1));

  // Nav coordinates update
  navTimer += dt;
  if (navTimer > 0.3 + Math.random() * 0.2) {
    navTimer = 0;
    const speed = curState === 'busy' ? 80 : curState === 'waiting' ? 30 : 5;
    navCoords.x += (Math.random()-0.5) * speed;
    navCoords.y += (Math.random()-0.5) * speed;
    navCoords.z += (Math.random()-0.5) * speed;
    navCoords.x = Math.max(-9999, Math.min(9999, navCoords.x));
    navCoords.y = Math.max(-9999, Math.min(9999, navCoords.y));
    navCoords.z = Math.max(-9999, Math.min(9999, navCoords.z));
  }

  // Blip count by state
  const targetBlips = curState === 'busy' ? 14 : curState === 'waiting' ? 8 : 4;
  while (radarBlips.length < targetBlips) radarBlips.push(...generateBlips(1));
  while (radarBlips.length > targetBlips) radarBlips.pop();

  // ─── Clear ───────────────────────────────────────────────────────────────
  ctx.fillStyle = '#000005';
  ctx.fillRect(0, 0, W, H);

  // Subtle vignette
  const vg = ctx.createRadialGradient(W/2,H/2,H*0.2, W/2,H/2,H*0.8);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);

  // Stars (idle hyperspace)
  drawStars(W, H, dt);

  // Dividers
  drawDividers(W, H, displayColor);

  // ─── Layout math ─────────────────────────────────────────────────────────
  const topBarH = 60;
  const bottomH = H - topBarH;
  const leftW   = W * 0.28;
  const rightW  = W * 0.28;
  const centerW = W - leftW - rightW;

  // Center panel
  const cx = leftW + centerW / 2;
  const cy = topBarH + (H - topBarH) * 0.44;
  const reticleR = Math.min(centerW, H - topBarH) * 0.33;

  // Radar panel (left)
  const radarCx = leftW * 0.5;
  const radarCy = topBarH + (H - topBarH) * 0.38;
  const radarR  = Math.min(leftW * 0.38, (H - topBarH) * 0.28);

  // Power grid (right)
  const pgX = W - rightW + rightW*0.2;
  const pgW = rightW * 0.6;
  const pgY = topBarH + 40;
  const pgH = (H - topBarH) * 0.55;

  // Nav (bottom-left)
  const navX = 14;
  const navY = H * 0.73;
  const navW = leftW - 20;

  // Systems (bottom-right)
  const sysX = W * 0.72 + 14;
  const sysY = H * 0.73;
  const sysW = rightW - 20;

  // ─── Draw panels ─────────────────────────────────────────────────────────

  // Top bar
  drawTopBar(W, displayColor);

  // Reticle
  drawReticle(cx, cy, reticleR, displayColor);

  // Radar
  drawRadar(radarCx, radarCy, radarR, displayColor);

  // Power grid
  drawPowerGrid(pgX, pgY, pgW, pgH, displayColor);

  // Nav data
  drawNavData(navX, navY, navW, displayColor);

  // System status
  drawSystemStatus(sysX, sysY, sysW, displayColor);

  // Corner brackets
  drawCornerBrackets(W, H, displayColor);

  // Edge pulse
  updateEdgePulse();

  requestAnimationFrame(render);
}

// Polyfill roundRect if needed
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    r = Math.min(r, w/2, h/2);
    this.beginPath();
    this.moveTo(x+r, y);
    this.lineTo(x+w-r, y);
    this.quadraticCurveTo(x+w, y, x+w, y+r);
    this.lineTo(x+w, y+h-r);
    this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    this.lineTo(x+r, y+h);
    this.quadraticCurveTo(x, y+h, x, y+h-r);
    this.lineTo(x, y+r);
    this.quadraticCurveTo(x, y, x+r, y);
    this.closePath();
    return this;
  };
}

requestAnimationFrame(render);
</script>
