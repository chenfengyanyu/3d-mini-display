<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traffic Light — Claude Status</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
  }

  body {
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
  }

  /* ── Ambient bloom (background) ── */
  .bloom {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 90vmin; height: 90vmin;
    border-radius: 50%;
    pointer-events: none;
    transition: background 0.7s ease;
    z-index: 0;
  }
  .bloom.busy    { background: radial-gradient(circle, rgba(255,59,48,0.07)  0%, transparent 70%); }
  .bloom.waiting { background: radial-gradient(circle, rgba(255,204,0,0.06)  0%, transparent 70%); }
  .bloom.idle    { background: radial-gradient(circle, rgba(52,199,89,0.06)  0%, transparent 70%); }

  /* ── Scene (scaled via JS) ── */
  .scene {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    transform-origin: center center;
  }

  /* ── Housing ── */
  .housing {
    width: 160px;
    background: linear-gradient(160deg, #323232 0%, #242424 100%);
    border-radius: 28px;
    padding: 24px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    border: 1.5px solid #888;
    box-shadow:
      0 0 0 1px #555,
      0 14px 52px rgba(0,0,0,0.85),
      inset 0 1px 0 rgba(255,255,255,0.1);
    position: relative;
  }

  /* Top cap */
  .housing::before {
    content: '';
    position: absolute;
    top: -10px; left: 50%;
    transform: translateX(-50%);
    width: 56px; height: 10px;
    background: #2e2e2e;
    border-radius: 5px 5px 0 0;
    border: 1.5px solid #888;
    border-bottom: none;
  }

  /* ── Light socket ── */
  .light-socket {
    width: 100px; height: 100px;
    border-radius: 50%;
    background: #0e0e0e;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: inset 0 3px 12px rgba(0,0,0,0.9);
  }

  /* ── Light bulb ── */
  .light {
    width: 84px; height: 84px;
    border-radius: 50%;
    opacity: 0.1;
    position: relative;
    transition: opacity 0.45s ease, box-shadow 0.45s ease, transform 0.45s ease;
  }

  /* Glare highlight */
  .light::after {
    content: '';
    position: absolute;
    top: 10%; left: 15%;
    width: 34%; height: 34%;
    background: radial-gradient(circle, rgba(255,255,255,0.45) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  .light.red    { background: radial-gradient(circle at 40% 35%, #ff8a82, #ff3b30 55%, #b02820); }
  .light.yellow { background: radial-gradient(circle at 40% 35%, #ffec82, #ffcc00 55%, #c09800); }
  .light.green  { background: radial-gradient(circle at 40% 35%, #8aff9e, #34c759 55%, #1a7a38); }

  /* Active bulb */
  .light.active {
    opacity: 1;
    transform: scale(1.05);
  }

  .light.red.active {
    box-shadow:
      0 0 14px 5px  rgba(255,59,48,0.55),
      0 0 45px 14px rgba(255,59,48,0.28),
      0 0 90px 24px rgba(255,59,48,0.12);
    animation: pulse-red 1s ease-in-out infinite;
  }

  .light.yellow.active {
    box-shadow:
      0 0 14px 5px  rgba(255,204,0,0.55),
      0 0 45px 14px rgba(255,204,0,0.28),
      0 0 90px 24px rgba(255,204,0,0.12);
    animation: blink-yellow 1.6s ease-in-out infinite;
  }

  .light.green.active {
    box-shadow:
      0 0 14px 5px  rgba(52,199,89,0.55),
      0 0 45px 14px rgba(52,199,89,0.28),
      0 0 90px 24px rgba(52,199,89,0.12);
    animation: glow-green 2.8s ease-in-out infinite;
  }

  @keyframes pulse-red {
    0%, 100% { box-shadow: 0 0 14px 5px rgba(255,59,48,0.55), 0 0 45px 14px rgba(255,59,48,0.28), 0 0 90px 24px rgba(255,59,48,0.12); transform: scale(1.05); }
    50%       { box-shadow: 0 0 22px 9px rgba(255,59,48,0.75), 0 0 65px 22px rgba(255,59,48,0.38), 0 0 130px 34px rgba(255,59,48,0.16); transform: scale(1.09); }
  }

  @keyframes blink-yellow {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.2; }
  }

  @keyframes glow-green {
    0%, 100% { box-shadow: 0 0 14px 5px rgba(52,199,89,0.45), 0 0 45px 14px rgba(52,199,89,0.22), 0 0 90px 24px rgba(52,199,89,0.09); }
    50%       { box-shadow: 0 0 20px 7px rgba(52,199,89,0.65), 0 0 60px 20px rgba(52,199,89,0.32), 0 0 110px 28px rgba(52,199,89,0.14); }
  }

  /* ── Pole ── */
  .pole {
    width: 16px; height: 110px;
    background: linear-gradient(to right, #2e2e2e, #444 40%, #222);
    border-radius: 0 0 5px 5px;
    border: 1px solid #555;
    border-top: none;
  }

  /* ── Base ── */
  .base {
    width: 110px; height: 18px;
    background: linear-gradient(to bottom, #333, #262626);
    border-radius: 8px;
    border: 1px solid #666;
  }

  /* ── Ground shadow ── */
  .ground-glow {
    width: 280px; height: 8px;
    border-radius: 50%;
    margin-top: 10px;
    transition: background 0.5s ease, box-shadow 0.5s ease;
  }
  .ground-glow.busy    { background: radial-gradient(ellipse, rgba(255,59,48,0.18)  0%, transparent 70%); box-shadow: 0 0 32px 10px rgba(255,59,48,0.09); }
  .ground-glow.waiting { background: radial-gradient(ellipse, rgba(255,204,0,0.15)  0%, transparent 70%); box-shadow: 0 0 32px 10px rgba(255,204,0,0.07); }
  .ground-glow.idle    { background: radial-gradient(ellipse, rgba(52,199,89,0.15)  0%, transparent 70%); box-shadow: 0 0 32px 10px rgba(52,199,89,0.07); }
</style>
</head>
<body>

<div class="bloom idle" id="bloom"></div>

<div class="scene" id="scene">
  <div class="housing">
    <div class="light-socket"><div class="light red"    id="light-red"   ></div></div>
    <div class="light-socket"><div class="light yellow" id="light-yellow"></div></div>
    <div class="light-socket"><div class="light green"  id="light-green" ></div></div>
  </div>
  <div class="pole"></div>
  <div class="base"></div>
  <div class="ground-glow idle" id="glow"></div>
</div>

<script>
  // ── DOM refs ──────────────────────────────────────
  const lights = {
    busy:    document.getElementById('light-red'),
    waiting: document.getElementById('light-yellow'),
    idle:    document.getElementById('light-green'),
  };
  const glow  = document.getElementById('glow');
  const bloom = document.getElementById('bloom');
  const scene = document.getElementById('scene');

  // ── Responsive scale ──────────────────────────────
  const NATURAL_W = 170, NATURAL_H = 560;
  function updateScale() {
    const s = Math.min(
      (window.innerWidth  * 0.72) / NATURAL_W,
      (window.innerHeight * 0.82) / NATURAL_H
    );
    scene.style.transform = `scale(${s})`;
  }
  window.addEventListener('resize', updateScale);
  updateScale();

  // ── Visual apply ──────────────────────────────────
  let displayState = null;
  function applyVisual(state) {
    if (state === displayState) return;
    displayState = state;
    Object.values(lights).forEach(l => l.classList.remove('active'));
    if (lights[state]) lights[state].classList.add('active');
    glow.className  = `ground-glow ${state}`;
    bloom.className = `bloom ${state}`;
  }

  // ── State machine ─────────────────────────────────
  // Only a genuine new user message (UserPromptSubmit) can interrupt
  // the yellow-hold or green-lock phases.
  // PreToolUse "busy" signals are background noise and are ignored
  // during these phases.

  let lastState = null;

  function setTrafficLight(state) {
    if (state === lastState) return;
    lastState = state;
    applyVisual(state);
  }

  // ── Message from parent ───────────────────────────
  window.addEventListener('message', ({ data }) => {
    if (data && data.state) setTrafficLight(data.state);
  });

  // ── Standalone polling ────────────────────────────
  async function pollStatus() {
    try {
      const res  = await fetch('/api/status');
      const data = await res.json();
      if (data.state) setTrafficLight(data.state);
    } catch { /* server not running */ }
  }

  if (window.self === window.top) {
    setInterval(pollStatus, 1000);
    pollStatus();
  }

  setTrafficLight('idle', null);
</script>
</body>
</html>
