<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECG — Claude Status</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #0a0a0a; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ── Waveform library ──────────────────────────────
// All functions accept t ∈ [0,1) and return amplitude [-0.3, 1.0]
function G(t, μ, σ, A) {
  return A * Math.exp(-0.5 * Math.pow((t - μ) / σ, 2));
}

const WAVES = [
  // W0 — Heart ♥  double lobes + V-valley
  t => G(t,0.16,0.050,0.65) + G(t,0.33,0.050,1.00)
     - G(t,0.24,0.028,0.30) - G(t,0.43,0.020,0.52) + G(t,0.53,0.030,0.18),

  // W1 — Lightning bolt  sharp spike + zigzag decay
  t => G(t,0.27,0.010,1.00) - G(t,0.32,0.009,0.72)
     + G(t,0.36,0.010,0.48) - G(t,0.40,0.009,0.32) + G(t,0.44,0.010,0.16),

  // W2 — Volcano  asymmetric mountain, steep left / gentle right
  t => G(t,0.25,0.045,1.00) * (t < 0.25 ? 1.3 : 0.7) + G(t,0.46,0.025,0.28) - G(t,0.52,0.015,0.14),

  // W3 — Twin peaks  two equal sharp spikes with bridge
  t => G(t,0.20,0.013,0.88) + G(t,0.36,0.013,1.00)
     - G(t,0.28,0.018,0.20) - G(t,0.43,0.011,0.24),

  // W4 — Sine burst  damped oscillation
  t => { const θ = (t - 0.12) * Math.PI * 5.5;
         return (t > 0.10 && t < 0.72)
           ? Math.sin(θ) * 0.90 * Math.exp(-4.5 * Math.pow(t - 0.38, 2))
           : 0; },

  // W5 — Triple notch  three rising spikes (staircase feel)
  t => G(t,0.16,0.020,0.52) + G(t,0.28,0.016,0.80) + G(t,0.40,0.020,1.00)
     - G(t,0.34,0.012,0.16) - G(t,0.46,0.013,0.28),

  // W6 — Sawtooth beat  sharp rise, exponential fall
  t => { const v = G(t,0.24,0.013,1.00);
         const tail = t > 0.27 ? G(t,0.50,0.14,0.30) : 0;
         return v + tail - G(t,0.30,0.018,0.18); },

  // W7 — Heartbeat classic  P + tall R + T
  t => G(t,0.10,0.022,0.16) + G(t,0.28,0.009,-0.12)
     + G(t,0.30,0.013,1.00) + G(t,0.33,0.009,-0.22)
     + G(t,0.48,0.038,0.28),
];

// ── Beat / waveform switcher ─────────────────────
let waveIdx    = 0;                // currently used waveform
let beatCount  = 0;                // completed beat cycles
let nextSwitch = 2 + Math.floor(Math.random() * 3); // switch every 2-4 beats

function ecgAt(phase) {
  const t = ((phase % 1) + 1) % 1;
  return WAVES[waveIdx](t);
}

// ── State configs ────────────────────────────────
const CFGS = {
  busy:    { bpm: 112, amp: 0.50, r: 255, g:  59, b:  48 },
  waiting: { bpm:  58, amp: 0.28, r: 255, g: 204, b:   0 },
  idle:    { bpm:  40, amp: 0.10, r:  52, g: 199, b:  89 },
};

let cfg = { ...CFGS.idle };
let tgt = { ...CFGS.idle };

let W, H, buf = [];
let phase = 0, lastTs = 0;

function resize() {
  W   = canvas.width  = canvas.offsetWidth;
  H   = canvas.height = canvas.offsetHeight;
  buf = new Array(W).fill(0);
}
window.addEventListener('resize', resize);
resize();

function lerp(a, b, t) { return a + (b - a) * t; }

// ── Draw ─────────────────────────────────────────
function animate(ts) {
  requestAnimationFrame(animate);
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  const k = 1 - Math.pow(0.04, dt);
  cfg.bpm = lerp(cfg.bpm, tgt.bpm, k);
  cfg.amp = lerp(cfg.amp, tgt.amp, k);
  cfg.r   = lerp(cfg.r, tgt.r, k);
  cfg.g   = lerp(cfg.g, tgt.g, k);
  cfg.b   = lerp(cfg.b, tgt.b, k);

  const speed    = W * cfg.bpm / 200;
  const phaseAdv = cfg.bpm / 60 * dt;
  const advance  = Math.max(1, Math.round(speed * dt));

  // Detect beat completion → maybe switch waveform
  const newPhase = (phase + phaseAdv) % 1;
  if (newPhase < phase) {          // wrapped: new beat
    beatCount++;
    if (beatCount >= nextSwitch) {
      // Pick a different waveform at random
      waveIdx = (waveIdx + 1 + Math.floor(Math.random() * (WAVES.length - 1))) % WAVES.length;
      nextSwitch = beatCount + 2 + Math.floor(Math.random() * 3);
    }
  }
  phase = newPhase;

  // Shift buffer left, fill new samples on right
  buf.copyWithin(0, advance);
  for (let i = 0; i < advance; i++) {
    const p = phase + phaseAdv * (i / advance);
    buf[W - advance + i] = ecgAt(p) * cfg.amp;
  }

  // Background
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.strokeStyle = 'rgba(255,255,255,0.028)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 60) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 60) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  const midY = H * 0.5;
  const ampH = H * 0.34;
  const cr = Math.round(cfg.r), cg = Math.round(cfg.g), cb = Math.round(cfg.b);
  const col = `rgb(${cr},${cg},${cb})`;

  // ── Main ECG line — tight glow only, no secondary blur ──
  ctx.shadowColor = col;
  ctx.shadowBlur  = 4;            // was 14 — tight glow, preserves sharpness
  ctx.strokeStyle = col;
  ctx.lineWidth   = 2.5;
  ctx.lineJoin    = 'round';
  ctx.beginPath();
  for (let x = 0; x < buf.length; x++) {
    const y = midY - buf[x] * ampH;
    x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.shadowBlur = 0;             // no secondary blur pass

  // Fade left (older data dims out)
  const fade = ctx.createLinearGradient(0, 0, W, 0);
  fade.addColorStop(0,    'rgba(10,10,10,0.98)');
  fade.addColorStop(0.50, 'rgba(10,10,10,0.35)');
  fade.addColorStop(0.82, 'rgba(10,10,10,0.06)');
  fade.addColorStop(1,    'rgba(10,10,10,0.00)');
  ctx.fillStyle = fade;
  ctx.fillRect(0, 0, W, H);

  // Head dot — sharp, no excessive blur
  const hx = buf.length - 1;
  const hy = midY - buf[hx] * ampH;
  ctx.shadowColor = col;
  ctx.shadowBlur  = 6;
  ctx.fillStyle   = '#ffffff';
  ctx.beginPath();
  ctx.arc(hx, hy, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Thin scanline column at head
  const sg = ctx.createLinearGradient(hx - 24, 0, hx + 1, 0);
  sg.addColorStop(0, 'rgba(255,255,255,0)');
  sg.addColorStop(1, `rgba(${cr},${cg},${cb},0.05)`);
  ctx.fillStyle = sg;
  ctx.fillRect(hx - 24, 0, 26, H);
}

// ── State machine ─────────────────────────────────

let lastState = null;
function applyState(s) { tgt = { ...CFGS[s] }; }
function setState(s) {
  if (s === lastState) return;
  lastState = s;
  applyState(s);
}

window.addEventListener('message', ({ data: d }) => { if (d?.state) setState(d.state); });
async function poll() {
  try { const d = await (await fetch('/api/status')).json(); if (d?.state) setState(d.state); } catch {}
}
if (window.self === window.top) { setInterval(poll, 1000); poll(); }

requestAnimationFrame(animate);
setState('idle', null);
</script>
</body>
</html>
